// partido donde juega BPC
function getPartidoBPC(fecha){
  return fecha.partidos.findIndex(p=>p[0]===BPC||p[1]===BPC);
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getResult(h,a){if(h===""||h===null||h===undefined||a===""||a===null||a===undefined)return null;const hn=parseInt(h),an=parseInt(a);if(hn>an)return"H";if(an>hn)return"A";return"D";}
function calcPts(pred,real){if(!pred||pred.h===""||pred.h===undefined||pred.a===""||pred.a===undefined)return 0;if(!real||real.h===null||real.h===undefined||real.h===""||real.a===null||real.a===undefined||real.a==="")return 0;const ph=parseInt(pred.h),pa=parseInt(pred.a),rh=parseInt(real.h),ra=parseInt(real.a);if(ph===rh&&pa===ra)return PTS_EXACTO;if(getResult(ph,pa)===getResult(rh,ra))return PTS_RESULTADO;return 0;}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

function emptyUser(){return{predPrimera:{},predIntermedia:{},especiales:{goleadoraPrimera:"",goleadoraIntermedia:"",campeonPrimera:"",campeonIntermedia:"",masVerdesPrimera:"",masVerdesIntermedia:"",masAmarillasPrimera:"",masAmarillasIntermedia:""},golesBPC:{},tarjetasBPC:{}};}
function initData(){return{jugadores:{},resultadosPrimera:{},resultadosIntermedia:{},especiales_resultado:{goleadoraPrimera:"",goleadoraIntermedia:"",campeonPrimera:"",campeonIntermedia:""},bloqueos:{especiales:false,fechas:{}},resultadosBPC:{},verificacionBPC:{}};}

// calcular puntos normales de una division
function calcScoreDiv(nombre,division,data){
  const preds=division==="primera"?(data.jugadores[nombre]?.predPrimera||{}):(data.jugadores[nombre]?.predIntermedia||{});
  const res=division==="primera"?data.resultadosPrimera:data.resultadosIntermedia;
  const esp=data.jugadores[nombre]?.especiales||{};
  const espR=data.especiales_resultado||{};
  let t=0;
  FECHAS.forEach(f=>f.partidos.forEach((_,pi)=>{
    // skip BPC match — counted separately in calcScoreBPC
    if(pi===getPartidoBPC(f))return;
    const k=`${f.n}-${pi}`;const r=res[k];
    if(r&&r.h!==null&&r.h!==undefined&&r.h!==""&&r.a!==null&&r.a!==undefined&&r.a!=="")t+=calcPts(preds[k],r);
  }));
  const gk=`goleadora${cap(division)}`,ck=`campeon${cap(division)}`;
  const vk=`masVerdes${cap(division)}`,ak=`masAmarillas${cap(division)}`;
  const overrides=espR.overrides||{};
  const gAcerto=overrides[`${division}_goleadora_${nombre}`]===true||(espR[gk]&&esp[gk]&&esp[gk].toLowerCase().trim()===espR[gk].toLowerCase().trim());
  if(gAcerto)t+=PTS_ESPECIAL;
  if(espR[ck]&&esp[ck]&&esp[ck]===espR[ck])t+=PTS_ESPECIAL;
  // tarjetas especiales (manual override only)
  if(overrides[`${division}_masVerdes_${nombre}`]===true)t+=PTS_TARJETA_ESP;
  if(overrides[`${division}_masAmarillas_${nombre}`]===true)t+=PTS_TARJETA_ESP;
  return t;
}

// calcular puntos de BPC (partidos+goles+tarjetas) para un jugador
function calcScoreBPC(nombre,division,data){
  let t=0;
  const preds=division==="primera"?(data.jugadores[nombre]?.predPrimera||{}):(data.jugadores[nombre]?.predIntermedia||{});
  const res=division==="primera"?data.resultadosPrimera:data.resultadosIntermedia;
  const verif=data.verificacionBPC||{};

  FECHAS.forEach(f=>{
    const pi=getPartidoBPC(f);
    if(pi===-1)return;
    const k=`${f.n}-${pi}`;
    const divKey=`${division}_${k}`;

    // puntos del resultado
    const r=res[k];
    if(r&&r.h!==null&&r.h!==undefined&&r.h!==""&&r.a!==null&&r.a!==undefined&&r.a!==""){
      t+=calcPts(preds[k],r);
    }

    // puntos de goles BPC — solo si el usuario tiene predicciones guardadas
    const golesVerif=verif[`goles_${divKey}`]||{};
    const userGoles=data.jugadores[nombre]?.golesBPC?.[divKey]?.goles||[];
    if(golesVerif[nombre]!==undefined && userGoles.length>0){
      t+=golesVerif[nombre]*PTS_GOL_JUG;
    }

    // puntos de tarjetas BPC — solo si el usuario tiene predicciones guardadas
    const tVerif=verif[`tarjetas_${divKey}`]||{};
    const userTarjetas=data.jugadores[nombre]?.tarjetasBPC?.[divKey]?.tarjetas||[];
    if(tVerif[nombre] && userTarjetas.length>0){
      if(tVerif[nombre].jug) t+=PTS_TARJETAS_JUG;
      else if(tVerif[nombre].num) t+=PTS_TARJETAS_NUM;
    }
  });
  return t;
}

async function cloudLoad(){const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`,{headers:{"X-Master-Key":JSONBIN_KEY,"X-Bin-Meta":"false"}});if(!r.ok)throw new Error();return await r.json();}
async function cloudSave(d){const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN_KEY},body:JSON.stringify(d)});if(!r.ok)throw new Error();}

function migrateData(d){
  if(!d)d=initData();
  if(!d.bloqueos)d.bloqueos={especiales:false,fechas:{}};
  if(!d.resultadosBPC)d.resultadosBPC={};
  if(!d.verificacionBPC)d.verificacionBPC={};
  Object.keys(d.jugadores||{}).forEach(n=>{
    if(!d.jugadores[n].golesBPC)d.jugadores[n].golesBPC={};
    if(!d.jugadores[n].tarjetasBPC)d.jugadores[n].tarjetasBPC={};
  });
  return d;
}

function AdminBloqueos({data,persist}){
  const R="#e53030",RD="#1a0000",RM="#2a0808",RB="#5a1010",GR="#884444";
  const bloqueos=data.bloqueos||{especiales:false,fechas:{}};
  const [confirmar,setConfirmar]=useState(null);

  function toggleEsp(){persist({...data,bloqueos:{...bloqueos,especiales:!bloqueos.especiales}});}
  function toggleFecha(n){const actual=bloqueos.fechas?.[n]||false;persist({...data,bloqueos:{...bloqueos,fechas:{...bloqueos.fechas,[n]:!actual}}});}
  function bloquearTodas(){const t={};FECHAS.forEach(f=>{t[f.n]=true;});persist({...data,bloqueos:{...bloqueos,fechas:t}});}
  function desbloquearTodas(){persist({...data,bloqueos:{...bloqueos,fechas:{}}});}
  function borrarUsuario(nombre){const nj={...data.jugadores};delete nj[nombre];persist({...data,jugadores:nj});setConfirmar(null);}
  function limpiarVerifFecha(n){
    const nv={...data.verificacionBPC};
    Object.keys(nv).forEach(k=>{if(k.includes(`_${n}-`))delete nv[k];});
    persist({...data,verificacionBPC:nv});
  }
  function limpiarFechaCompleta(n){
    // borra resultados, predicciones de todos los jugadores, y verificacion BPC de una fecha
    const nprim={...data.resultadosPrimera};
    const nint={...data.resultadosIntermedia};
    Object.keys(nprim).filter(k=>k.startsWith(`${n}-`)).forEach(k=>delete nprim[k]);
    Object.keys(nint).filter(k=>k.startsWith(`${n}-`)).forEach(k=>delete nint[k]);
    const nv={...data.verificacionBPC};
    Object.keys(nv).forEach(k=>{if(k.includes(`_${n}-`))delete nv[k];});
    const nj={...data.jugadores};
    Object.keys(nj).forEach(nom=>{
      const u={...nj[nom]};
      if(u.predPrimera){const p={...u.predPrimera};Object.keys(p).filter(k=>k.startsWith(`${n}-`)).forEach(k=>delete p[k]);u.predPrimera=p;}
      if(u.predIntermedia){const p={...u.predIntermedia};Object.keys(p).filter(k=>k.startsWith(`${n}-`)).forEach(k=>delete p[k]);u.predIntermedia=p;}
      if(u.golesBPC){const g={...u.golesBPC};Object.keys(g).filter(k=>k.includes(`_${n}-`)).forEach(k=>delete g[k]);u.golesBPC=g;}
      if(u.tarjetasBPC){const t={...u.tarjetasBPC};Object.keys(t).filter(k=>k.includes(`_${n}-`)).forEach(k=>delete t[k]);u.tarjetasBPC=t;}
      nj[nom]=u;
    });
    persist({...data,resultadosPrimera:nprim,resultadosIntermedia:nint,verificacionBPC:nv,jugadores:nj});
  }
  const jugadores=Object.keys(data.jugadores);

  return(
    <div>
      <div style={{background:"#2a0000",border:`2px solid ${R}`,borderRadius:12,padding:"16px",marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:900,color:R,letterSpacing:"0.08em",marginBottom:14}}>🗑️ USUARIAS REGISTRADAS</div>
        {jugadores.length===0&&<div style={{color:GR,fontSize:12}}>No hay usuarias todavía.</div>}
        {jugadores.map(nombre=>(
          <div key={nombre} style={{background:RM,border:`1px solid ${RB}`,borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontWeight:700,fontSize:14,color:"#ffcccc"}}>👤 {nombre}</div>
            {confirmar===nombre
              ?<div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:11,color:"#ff6666"}}>¿Segura?</span>
                <button onClick={()=>borrarUsuario(nombre)} style={{background:"#5a0000",border:`1px solid ${R}`,borderRadius:7,padding:"5px 12px",fontSize:12,fontWeight:800,color:"#ff4444",cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>Sí, sacar</button>
                <button onClick={()=>setConfirmar(null)} style={{background:RM,border:`1px solid ${RB}`,borderRadius:7,padding:"5px 12px",fontSize:12,fontWeight:800,color:GR,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>Cancelar</button>
              </div>
              :<button onClick={()=>setConfirmar(nombre)} style={{background:"#2a0000",border:"1px solid #5a1010",borderRadius:7,padding:"5px 12px",fontSize:12,fontWeight:700,color:"#ff6666",cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>🗑️ Sacar</button>
            }
          </div>
        ))}
      </div>
      <div style={{background:"#2a0000",border:`2px solid ${R}`,borderRadius:12,padding:"16px",marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:900,color:R,letterSpacing:"0.08em",marginBottom:14}}>🔑 PANEL DE BLOQUEOS</div>
        <div style={{background:RM,border:`1px solid ${RB}`,borderRadius:10,padding:"12px 14px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:"#ffcccc"}}>⭐ Especiales</div>
            <div style={{fontSize:11,color:GR,marginTop:2}}>Goleadora y campeón</div>
          </div>
          <button onClick={toggleEsp} style={{background:bloqueos.especiales?"#3a0000":R,border:`2px solid ${bloqueos.especiales?"#ff4444":R}`,borderRadius:9,padding:"8px 16px",fontSize:13,fontWeight:900,color:"#fff",cursor:"pointer",fontFamily:"'Outfit',sans-serif",minWidth:110}}>
            {bloqueos.especiales?"🔒 BLOQUEADO":"🔓 ABIERTO"}
          </button>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <button onClick={desbloquearTodas} style={{flex:1,background:"#082008",border:"1px solid #1a6600",borderRadius:8,padding:"8px",fontSize:11,fontWeight:800,color:"#66ff66",cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>🔓 Abrir todas</button>
          <button onClick={bloquearTodas} style={{flex:1,background:"#2a0000",border:"1px solid #5a1010",borderRadius:8,padding:"8px",fontSize:11,fontWeight:800,color:"#ff6666",cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>🔒 Cerrar todas</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8}}>
          {FECHAS.map(f=>{
            const bloq=bloqueos.fechas?.[f.n]||false;
            return(
              <button key={f.n} onClick={()=>toggleFecha(f.n)} style={{background:bloq?"#2a0000":RM,border:`1px solid ${bloq?"#5a1010":"#1a6600"}`,borderRadius:9,padding:"10px 8px",cursor:"pointer",fontFamily:"'Outfit',sans-serif",textAlign:"center"}}>
                <div style={{fontSize:12,fontWeight:900,color:bloq?"#ff4444":"#66ff66"}}>F{f.n} {bloq?"🔒":"🔓"}</div>
                <div style={{fontSize:10,color:GR,marginTop:2}}>{f.dia}</div>
              </button>
            );
          })}
        </div>
      </div>

      {/* LIMPIAR DATOS */}
      <div style={{background:"#1a0a00",border:"1px solid #4a2200",borderRadius:12,padding:"14px 16px",marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:900,color:"#ffcc44",letterSpacing:"0.08em",marginBottom:4}}>🧹 LIMPIAR DATOS POR FECHA</div>
        <div style={{fontSize:11,color:"#884400",marginBottom:12}}>Borra <strong style={{color:"#ffaa44"}}>todo</strong> de una fecha: resultados, predicciones de todas y verificación BPC.</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:6}}>
          {FECHAS.map(f=>{
            const tieneRes=Object.keys(data.resultadosPrimera||{}).some(k=>k.startsWith(`${f.n}-`))||Object.keys(data.resultadosIntermedia||{}).some(k=>k.startsWith(`${f.n}-`));
            const tienePred=Object.values(data.jugadores||{}).some(u=>Object.keys(u.predPrimera||{}).some(k=>k.startsWith(`${f.n}-`))||Object.keys(u.predIntermedia||{}).some(k=>k.startsWith(`${f.n}-`)));
            const tieneVerif=Object.keys(data.verificacionBPC||{}).some(k=>k.includes(`_${f.n}-`));
            const tiene=tieneRes||tienePred||tieneVerif;
            return(
              <button key={f.n} onClick={()=>{if(window.confirm(`¿Borrar TODOS los datos de la Fecha ${f.n}? Esto incluye resultados, pronósticos de todas y verificación BPC.`))limpiarFechaCompleta(f.n);}} disabled={!tiene} style={{background:tiene?"#2a0a00":"#150000",border:`1px solid ${tiene?"#4a2200":"#2a0000"}`,borderRadius:8,padding:"8px 6px",cursor:tiene?"pointer":"default",fontFamily:"'Outfit',sans-serif",textAlign:"center",opacity:tiene?1:0.35}}>
                <div style={{fontSize:11,fontWeight:900,color:tiene?"#ffaa44":"#443333"}}>F{f.n}</div>
                <div style={{fontSize:9,color:tiene?"#884400":"#332200",marginTop:1}}>{tiene?"🧹 borrar todo":"vacía"}</div>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── ESPIAR TAB ──────────────────────────────────────────────────────────────
function EspiarTab({data,userName,division,bloqueos,resultados}){
  const R="#e53030",RD="#1a0000",RM="#2a0808",RB="#5a1010",GR="#884444";
  const [fechaIdx,setFechaIdx]=useState(0);
  const [verJugadora,setVerJugadora]=useState(null);
  const fecha=FECHAS[fechaIdx];
  const fechaBloq=bloqueos.fechas?.[fecha.n]||false;
  const jugadores=Object.keys(data.jugadores);
  const navBtn=dis=>({background:RM,border:`1px solid ${RB}`,borderRadius:8,width:36,height:36,color:R,fontSize:22,cursor:dis?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:dis?0.25:1,flexShrink:0});

  return(
    <div>
      <div style={{background:RM,border:`1px solid ${RB}`,borderRadius:12,padding:"11px 15px",marginBottom:14,fontSize:12,color:GR}}>
        👀 Solo podés ver pronósticos de fechas <span style={{color:"#ff4444",fontWeight:700}}>bloqueadas</span> por la admin.
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <button onClick={()=>fechaIdx>0&&setFechaIdx(i=>i-1)} style={navBtn(fechaIdx===0)}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:900,color:fechaBloq?R:"#553333"}}>FECHA {fecha.n}</div>
          <div style={{fontSize:12,color:GR}}>{fecha.dia} · {division==="primera"?"PRIMERA":"INTERMEDIA"}</div>
          {fechaBloq?<div style={{fontSize:11,color:"#ff4444",fontWeight:700,marginTop:2}}>🔒 Pronósticos visibles</div>
            :<div style={{fontSize:11,color:GR,marginTop:2}}>🔓 Aún no bloqueada</div>}
        </div>
        <button onClick={()=>fechaIdx<FECHAS.length-1&&setFechaIdx(i=>i+1)} style={navBtn(fechaIdx===FECHAS.length-1)}>›</button>
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:16}}>
        {FECHAS.map((f,i)=>{
          const bl=bloqueos.fechas?.[f.n]||false;
          return<button key={f.n} onClick={()=>{setFechaIdx(i);setVerJugadora(null);}} style={{background:fechaIdx===i?R:RM,border:`1px solid ${fechaIdx===i?R:bl?"#e5303055":RB}`,borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:700,color:fechaIdx===i?"#fff":bl?R:GR,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>{f.n}{bl?"🔒":""}</button>;
        })}
      </div>
      {!fechaBloq&&(
        <div style={{background:"#200000",border:`1px solid ${RB}`,borderRadius:12,padding:"30px",textAlign:"center",color:"#553333",fontSize:14,fontWeight:700}}>
          🔓 Esta fecha todavía está abierta.<br/>
          <span style={{fontSize:12,fontWeight:400,color:GR}}>Los pronósticos se revelan cuando la admin la bloquee.</span>
        </div>
      )}
      {fechaBloq&&(
        <div>
          {bloqueos.especiales&&(
            <div style={{background:"#200000",border:`2px solid ${R}`,borderRadius:12,padding:"14px 16px",marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:900,color:R,letterSpacing:"0.08em",marginBottom:12}}>⭐ ESPECIALES DE TODAS</div>
              {[["Primera","primera"],["Intermedia","intermedia"]].map(([label,div])=>{
                const gk=`goleadora${cap(div)}`,ck=`campeon${cap(div)}`;
                const espRes=data.especiales_resultado||{};
                const jf=verJugadora?[verJugadora]:jugadores;
                return(
                  <div key={div} style={{marginBottom:14}}>
                    <div style={{fontSize:11,fontWeight:800,color:R,letterSpacing:"0.1em",marginBottom:8,borderBottom:"1px solid #3a0000",paddingBottom:4}}>{label.toUpperCase()}</div>
                    <div style={{marginBottom:8}}>
                      <div style={{fontSize:10,color:GR,marginBottom:4}}>⚽ GOLEADORA</div>
                      {jf.map(nom=>{const esp=data.jugadores[nom]?.especiales||{};const val=esp[gk];if(!val)return null;const acerto=espRes[gk]&&val.toLowerCase().trim()===espRes[gk].toLowerCase().trim();const yo=nom===userName;return(<div key={nom} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:yo?"#2a0000":"#150000",border:`1px solid ${yo?R:"#2a0000"}`,borderRadius:7,padding:"5px 10px",marginBottom:3}}><span style={{fontSize:12,fontWeight:yo?800:500,color:yo?R:"#cc9999"}}>{yo?"→ ":""}{nom}</span><div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:12,color:yo?R:"#ffcccc"}}>{val}</span>{espRes[gk]&&<span style={{fontSize:13,color:acerto?"#ffd700":"#553333"}}>{acerto?"⭐":"✗"}</span>}</div></div>);}).filter(Boolean)}
                    </div>
                    <div>
                      <div style={{fontSize:10,color:GR,marginBottom:4}}>🏆 CAMPEÓN</div>
                      {jf.map(nom=>{const esp=data.jugadores[nom]?.especiales||{};const val=esp[ck];if(!val)return null;const acerto=espRes[ck]&&val===espRes[ck];const yo=nom===userName;return(<div key={nom} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:yo?"#2a0000":"#150000",border:`1px solid ${yo?R:"#2a0000"}`,borderRadius:7,padding:"5px 10px",marginBottom:3}}><span style={{fontSize:12,fontWeight:yo?800:500,color:yo?R:"#cc9999"}}>{yo?"→ ":""}{nom}</span><div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:12,color:yo?R:"#ffcccc"}}>{val}</span>{espRes[ck]&&<span style={{fontSize:13,color:acerto?"#ffd700":"#553333"}}>{acerto?"⭐":"✗"}</span>}</div></div>);}).filter(Boolean)}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {!bloqueos.especiales&&<div style={{background:"#150000",border:"1px solid #2a0000",borderRadius:10,padding:"12px 16px",marginBottom:16,fontSize:12,color:GR,textAlign:"center"}}>⭐ Los especiales se revelan cuando la admin los bloquee.</div>}
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            <button onClick={()=>setVerJugadora(null)} style={{background:verJugadora===null?R:RM,border:`1px solid ${verJugadora===null?R:RB}`,borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:800,color:verJugadora===null?"#fff":GR,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>📊 Todas</button>
            {jugadores.map(nom=>(
              <button key={nom} onClick={()=>setVerJugadora(nom)} style={{background:verJugadora===nom?(nom===userName?R:"#1a3300"):RM,border:`1px solid ${verJugadora===nom?(nom===userName?R:"#336600"):RB}`,borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:800,color:verJugadora===nom?(nom===userName?R:"#66ff66"):GR,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>
                {nom===userName?"→ ":""}{nom}
              </button>
            ))}
          </div>
          {fecha.partidos.map((partido,pi)=>{
            const key=`${fecha.n}-${pi}`;
            const real=resultados[key];
            const hasReal=real&&real.h!==null&&real.h!==undefined&&real.h!==""&&real.a!==null&&real.a!==undefined&&real.a!=="";
            const jf=verJugadora?[verJugadora]:jugadores;
            const preds=jf.map(nom=>{
              const u=data.jugadores[nom];const pp=division==="primera"?u?.predPrimera:u?.predIntermedia;const p=pp?.[key];
              if(!p||p.h===undefined||p.h===""||p.a===undefined||p.a==="")return null;
              const pts=hasReal?calcPts(p,real):null;return{nom,h:p.h,a:p.a,pts,yo:nom===userName};
            }).filter(Boolean);
            return(
              <div key={pi} style={{background:RM,border:`1px solid ${RB}`,borderRadius:12,padding:"12px 14px",marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:11,color:GR,letterSpacing:"0.08em"}}>PARTIDO {pi+1}</div>
                  {hasReal&&<div style={{fontSize:12,fontWeight:800,color:R}}>Real: {real.h} — {real.a}</div>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:6,alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:13,fontWeight:700,textAlign:"right",lineHeight:1.2,color:"#ffcccc"}}>{partido[0]}</div>
                  <div style={{fontSize:12,color:GR,fontWeight:700}}>vs</div>
                  <div style={{fontSize:13,fontWeight:700,textAlign:"left",lineHeight:1.2,color:"#ffcccc"}}>{partido[1]}</div>
                </div>
                {preds.length===0?<div style={{textAlign:"center",fontSize:11,color:GR,padding:"8px 0"}}>Nadie cargó pronóstico.</div>
                  :<div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {preds.sort((a,b)=>(b.pts||0)-(a.pts||0)).map(p=>(
                      <div key={p.nom} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:p.yo?"#2a0000":"#150000",border:`1px solid ${p.yo?R:"#2a0000"}`,borderRadius:7,padding:"6px 12px"}}>
                        <span style={{fontSize:12,fontWeight:p.yo?800:500,color:p.yo?R:"#cc9999"}}>{p.yo?"→ ":""}{p.nom}</span>
                        <div style={{display:"flex",gap:10,alignItems:"center"}}>
                          <span style={{fontSize:14,fontWeight:900,color:p.yo?R:"#ffcccc"}}>{p.h} — {p.a}</span>
                          {p.pts!==null&&<span style={{fontSize:13,color:p.pts===3?"#ffd700":p.pts===1?"#ff8866":"#553333"}}>{p.pts===3?"⭐":p.pts===1?"✓":"✗"}</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                }
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── BPC TAB (predicciones goles y tarjetas de Banco Provincia) ───────────────
function BPCTab({data,userName,division,bloqueos,persist,isAdmin}){
  const R="#e53030",RD="#1a0000",RM="#2a0808",RB="#5a1010",GR="#884444";
  const [fechaIdx,setFechaIdx]=useState(0);
  const [saved,setSaved]=useState(false);
  const fecha=FECHAS[fechaIdx];
  const fechaBloq=bloqueos.fechas?.[fecha.n]||false;
  const piB=getPartidoBPC(fecha);
  const navBtn=dis=>({background:RM,border:`1px solid ${RB}`,borderRadius:8,width:36,height:36,color:R,fontSize:22,cursor:dis?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:dis?0.25:1,flexShrink:0});
  const divKey=`${division}_${fecha.n}-${piB}`;

  const myUser=data.jugadores[userName]||emptyUser();
  const myGoles=myUser.golesBPC?.[divKey]||{goles:[]};
  const myTarjetas=myUser.tarjetasBPC?.[divKey]||{tarjetas:[]};
  // goles: [{jugadora, cantidad}]
  // tarjetas: [{tipo, jugadora}]

  function saveGoles(newGoles){
    const nu={...myUser,golesBPC:{...myUser.golesBPC,[divKey]:{goles:newGoles}}};
    persist({...data,jugadores:{...data.jugadores,[userName]:nu}});
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  }
  function saveTarjetas(newT){
    const nu={...myUser,tarjetasBPC:{...myUser.tarjetasBPC,[divKey]:{tarjetas:newT}}};
    persist({...data,jugadores:{...data.jugadores,[userName]:nu}});
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  }

  // Admin: verificacion
  const verif=data.verificacionBPC||{};
  const golesVerif=verif[`goles_${divKey}`]||{};
  const tVerif=verif[`tarjetas_${divKey}`]||{};
  const jugadores=Object.keys(data.jugadores);

  function setGolesVerif(nombre,cant){
    const nv={...verif,[`goles_${divKey}`]:{...golesVerif,[nombre]:cant}};
    persist({...data,verificacionBPC:nv});
  }
  function setTVerif(nombre,tipo,val){
    const cur=tVerif[nombre]||{num:false,jug:false};
    let nEntry;
    if(tipo==="jug")nEntry={num:val?true:cur.num,jug:val};
    else nEntry={...cur,[tipo]:val};
    const nv={...verif,[`tarjetas_${divKey}`]:{...tVerif,[nombre]:nEntry}};
    persist({...data,verificacionBPC:nv});
  }

  if(piB===-1){
    return <div style={{background:RM,border:`1px solid ${RB}`,borderRadius:12,padding:30,textAlign:"center",color:GR,marginTop:10}}>Bco. Provincia B no juega en esta fecha.</div>;
  }
  const partido=fecha.partidos[piB];

  return(
    <div>
      <div style={{background:"#1a0a00",border:"1px solid #4a2200",borderRadius:12,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#ffaa44"}}>
        🏑 Predicciones especiales para partidos de <span style={{fontWeight:900,color:"#ffcc44"}}>Bco. Provincia B</span>
      </div>

      {/* Nav fecha */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <button onClick={()=>fechaIdx>0&&setFechaIdx(i=>i-1)} style={navBtn(fechaIdx===0)}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:900,color:fechaBloq?"#553333":"#ffcc44"}}>FECHA {fecha.n}</div>
          <div style={{fontSize:12,color:GR}}>{fecha.dia} · {division==="primera"?"PRIMERA":"INTERMEDIA"}</div>
          {fechaBloq&&<div style={{fontSize:11,color:"#ff4444",fontWeight:700,marginTop:2}}>🔒 Cerrada</div>}
        </div>
        <button onClick={()=>fechaIdx<FECHAS.length-1&&setFechaIdx(i=>i+1)} style={navBtn(fechaIdx===FECHAS.length-1)}>›</button>
      </div>

      {/* Pills fechas donde juega BPC */}

// ─── GOLES INPUT ──────────────────────────────────────────────────────────────
function GolesBPC({goles,bloq,onSave}){
  const R="#e53030",RD="#1a0000",RM="#2a0808",RB="#5a1010",GR="#884444";
  const [list,setList]=useState(goles.length>0?goles:[{jugadora:"",cantidad:1}]);
  const [dirty,setDirty]=useState(false);

  function add(){setList(l=>[...l,{jugadora:"",cantidad:1}]);setDirty(true);}
  function remove(i){setList(l=>l.filter((_,j)=>j!==i));setDirty(true);}
  function update(i,field,val){setList(l=>l.map((x,j)=>j===i?{...x,[field]:val}:x));setDirty(true);}
  function save(){onSave(list);setDirty(false);}

  return(
    <div style={{background:RM,border:`1px solid ${RB}`,borderRadius:12,padding:"14px",marginBottom:12}}>
      <div style={{fontSize:12,fontWeight:800,color:"#ffcc44",letterSpacing:"0.08em",marginBottom:10}}>⚽ GOLES DE BANCO PROVINCIA</div>
      <div style={{fontSize:11,color:GR,marginBottom:10}}>+{PTS_GOL_JUG} pts por cada goleadora acertada (verificado por admin)</div>
      {list.map((g,i)=>(
        <div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
          <input type="number" min="1" max="9" value={g.cantidad} disabled={bloq} onChange={e=>update(i,"cantidad",parseInt(e.target.value)||1)} style={{width:44,height:40,background:RD,border:`1px solid ${RB}`,borderRadius:8,color:"#ffcc44",fontSize:18,fontWeight:900,textAlign:"center",fontFamily:"'Outfit',sans-serif",opacity:bloq?0.4:1}}/>
          <span style={{color:GR,fontSize:12}}>×</span>
          <input type="text" value={g.jugadora} disabled={bloq} onChange={e=>update(i,"jugadora",e.target.value)} placeholder="Nombre jugadora..." className="tag-input" style={{flex:1,opacity:bloq?0.4:1}}/>
          {!bloq&&<button onClick={()=>remove(i)} style={{background:"#3a0000",border:"none",borderRadius:7,width:32,height:32,color:"#ff4444",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>}
        </div>
      ))}
      {!bloq&&(
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <button onClick={add} style={{flex:1,background:"#082008",border:"1px solid #1a6600",borderRadius:8,padding:"8px",fontSize:12,fontWeight:800,color:"#66ff66",cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>+ Agregar gol</button>
          <button onClick={save} disabled={!dirty} style={{flex:1,background:dirty?R:"#3a0808",border:"none",borderRadius:8,padding:"8px",fontSize:12,fontWeight:800,color:"#fff",cursor:dirty?"pointer":"default",fontFamily:"'Outfit',sans-serif"}}>💾 Guardar goles</button>
        </div>
      )}
      {bloq&&<div style={{fontSize:11,color:"#553333",marginTop:8,textAlign:"center"}}>🔒 Fecha cerrada</div>}
    </div>
  );
}

            {TIPOS_TARJETA.map(tt=><option key={tt} value={tt}>{tt.charAt(0).toUpperCase()+tt.slice(1)}</option>)}
          </select>
          <input type="text" value={t.jugadora} disabled={bloq} onChange={e=>update(i,"jugadora",e.target.value)} placeholder="Jugadora amonestada..." className="tag-input" style={{flex:1,opacity:bloq?0.4:1}}/>
          {!bloq&&<button onClick={()=>remove(i)} style={{background:"#3a0000",border:"none",borderRadius:7,width:32,height:32,color:"#ff4444",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>}

        </div>
      )}

// ─── MAIN SCREEN ──────────────────────────────────────────────────────────────
function MainScreen({userName,isAdmin,data,persist,syncStatus,onLogout,onRefresh}){
  const [tab,setTab]=useState("pronosticos");
  const [division,setDivision]=useState("primera");
  const [fechaIdx,setFechaIdx]=useState(0);
  const [rankTab,setRankTab]=useState("general");
  const [savedRes,setSavedRes]=useState(false);
  const [savedPred,setSavedPred]=useState(false);
  const pendingRes=useRef({});
  const pendingPred=useRef({});

  const bloqueos=data.bloqueos||{especiales:false,fechas:{}};
  const myUser=data.jugadores[userName]||emptyUser();
  const myPreds=division==="primera"?myUser.predPrimera:myUser.predIntermedia;
  const resultados=division==="primera"?data.resultadosPrimera:data.resultadosIntermedia;
  const fecha=FECHAS[fechaIdx];
  const fechaBloq=bloqueos.fechas?.[fecha.n]||false;
  const espBloq=bloqueos.especiales||false;

  function setPred(fechaN,pi,side,val){
    if(bloqueos.fechas?.[fechaN])return;
    const num=val===""?"":(Math.max(0,Math.min(99,parseInt(val)||0)));
    const key=`${fechaN}-${pi}`;
    const pk=division==="primera"?"predPrimera":"predIntermedia";
    if(!pendingPred.current[pk])pendingPred.current[pk]={...myPreds};
    pendingPred.current[pk][key]={...(pendingPred.current[pk][key]||{}),[side]:num};
    setSavedPred(false);
    // also update local display state immediately via persist for UX
    persist({...data,jugadores:{...data.jugadores,[userName]:{...myUser,[pk]:{...myPreds,[key]:{...(myPreds[key]||{}),[side]:num}}}}});
  }
  function savePronos(){
    // force a cloud sync of current data
    persist({...data});
    pendingPred.current={};
    setSavedPred(true);
    setTimeout(()=>setSavedPred(false),2500);
  }

  // resultados con boton guardar — usando estado local para evitar mezcla entre divisiones
  const [localRes,setLocalRes]=useState({});
  const localResKey=`${division}_${fecha?.n}`;
  function setResultadoLocal(fechaN,pi,side,val){
    const key=`${fechaN}-${pi}`;
    const num=val===""?"":Math.max(0,Math.min(99,parseInt(val)||0));
    setLocalRes(prev=>({...prev,[`${division}_${fechaN}_${pi}_${side}`]:num}));
    setSavedRes(false);
  }
  function saveResultados(){
    const rk=division==="primera"?"resultadosPrimera":"resultadosIntermedia";
    const updated={...data[rk]};
    fecha.partidos.forEach((_,pi)=>{
      const key=`${fecha.n}-${pi}`;
      const hKey=`${division}_${fecha.n}_${pi}_h`;
      const aKey=`${division}_${fecha.n}_${pi}_a`;
      const hVal=localRes[hKey]!==undefined?localRes[hKey]:null;
      const aVal=localRes[aKey]!==undefined?localRes[aKey]:null;
      // only update if both sides have been touched or already existed
      if(localRes[hKey]!==undefined||localRes[aKey]!==undefined){
        updated[key]={
          h:localRes[hKey]!==undefined?localRes[hKey]:(data[rk][key]?.h??null),
          a:localRes[aKey]!==undefined?localRes[aKey]:(data[rk][key]?.a??null)
        };
      }
    });
    persist({...data,[rk]:updated});
    setSavedRes(true);
    setTimeout(()=>setSavedRes(false),2500);
  }
  function getResVal(fechaN,pi,side){
    const lk=`${division}_${fechaN}_${pi}_${side}`;
    if(localRes[lk]!==undefined)return localRes[lk];
    const rk=division==="primera"?"resultadosPrimera":"resultadosIntermedia";
    const r=data[rk][`${fechaN}-${pi}`];
    return r?.[side]!==null&&r?.[side]!==undefined?r[side]:"";
  }

  function setEspecial(campo,val){
    if(espBloq)return;
    persist({...data,jugadores:{...data.jugadores,[userName]:{...myUser,especiales:{...(myUser.especiales||{}),[campo]:val}}}});
  }
  function setEspRes(campo,val){
    persist({...data,especiales_resultado:{...(data.especiales_resultado||{}),[campo]:val}});
  }

  const jugadores=Object.keys(data.jugadores);
  const mkRank=div=>jugadores.map(n=>({nombre:n,score:calcScoreDiv(n,div,data)+calcScoreBPC(n,div,data),yo:n===userName})).sort((a,b)=>b.score-a.score);
  const rankPrimera=mkRank("primera"),rankInter=mkRank("intermedia");
  const rankGeneral=jugadores.map(n=>({nombre:n,score:calcScoreDiv(n,"primera",data)+calcScoreBPC(n,"primera",data)+calcScoreDiv(n,"intermedia",data)+calcScoreBPC(n,"intermedia",data),yo:n===userName})).sort((a,b)=>b.score-a.score);

  // ranking BPC: puntos de partidos+goles+tarjetas de BPC
  const mkRankBPC=div=>jugadores.map(n=>{
    const s=calcScoreBPC(n,div,data);
    return{nombre:n,score:s,yo:n===userName};
  }).sort((a,b)=>b.score-a.score);
  const rankBPCPrimera=mkRankBPC("primera"),rankBPCInter=mkRankBPC("intermedia");
  const rankBPCGeneral=jugadores.map(n=>({nombre:n,score:calcScoreBPC(n,"primera",data)+calcScoreBPC(n,"intermedia",data),yo:n===userName})).sort((a,b)=>b.score-a.score);

  const R="#e53030",RD="#1a0000",RM="#2a0808",RB="#5a1010",GR="#884444";
  const tabSt=a=>({background:"none",border:"none",padding:"10px 10px",fontSize:11,fontWeight:800,letterSpacing:"0.06em",textTransform:"uppercase",cursor:"pointer",color:a?R:"#553333",borderBottom:a?`2px solid ${R}`:"2px solid transparent",whiteSpace:"nowrap",fontFamily:"'Outfit',sans-serif",marginBottom:-1});
  const cardSt={background:RM,border:`1px solid ${RB}`,borderRadius:12,padding:"14px 16px",marginBottom:10};
  const inpSt={width:44,height:44,background:RD,border:`2px solid ${RB}`,borderRadius:8,color:R,fontSize:20,fontWeight:800,textAlign:"center",fontFamily:"'Outfit',sans-serif"};
  const navBtn=dis=>({background:RM,border:`1px solid ${RB}`,borderRadius:8,width:36,height:36,color:R,fontSize:22,cursor:dis?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:dis?0.25:1,flexShrink:0});

  const tabs=[["pronosticos","🗳️ Pronóst."],["ranking","🏆 Ranking"],["especiales","⭐ Especiales"],["banquito","🏑 Banquito B"],["espiar","👀 Ver todas"]];
  if(isAdmin){tabs.push(["resultados","✅ Resultados"]);tabs.push(["bloqueos","🔒 Bloqueos"]);}

  return(
    <div style={{minHeight:"100vh",background:RD,color:"#fff",fontFamily:"'Outfit',sans-serif"}}>
      {/* HEADER */}
      <div style={{background:"#2a0000",borderBottom:`2px solid ${RB}`,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div>
          <div style={{fontSize:18,fontWeight:900}}>🏑 <span style={{color:R}}>PRODE</span> 2026</div>
          <SyncBadge s={syncStatus}/>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={onRefresh} title="Actualizar" style={{background:RM,border:`1px solid ${RB}`,borderRadius:8,width:32,height:32,color:GR,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>⟳</button>
          <div style={{background:isAdmin?"#3a0000":RM,border:`1px solid ${isAdmin?R:RB}`,borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:700,color:isAdmin?R:"#ffcccc"}}>{isAdmin?"🔑":"👤"} {userName}</div>
          <button onClick={onLogout} style={{background:"none",border:`1px solid ${RB}`,borderRadius:8,padding:"4px 9px",fontSize:11,color:GR,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>Salir</button>
        </div>
      </div>

      {/* TABS */}
      <div style={{display:"flex",background:"#150000",borderBottom:`1px solid ${RB}`,overflowX:"auto"}}>
        {tabs.map(([id,l])=><button key={id} style={tabSt(tab===id)} onClick={()=>setTab(id)}>{l}</button>)}

                <div key={pi} style={{...cardSt}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"center"}}>
                    <div style={{fontSize:13,fontWeight:700,textAlign:"right",lineHeight:1.2}}>{partido[0]}</div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <input type="number" min="0" max="99" className="si" value={getResVal(fecha.n,pi,"h")} onChange={e=>setResultadoLocal(fecha.n,pi,"h",e.target.value)} style={{...inpSt,borderColor:"#ff8866",color:"#ff8866"}}/>
                      <span style={{color:"#553333",fontSize:14}}>—</span>
                      <input type="number" min="0" max="99" className="si" value={getResVal(fecha.n,pi,"a")} onChange={e=>setResultadoLocal(fecha.n,pi,"a",e.target.value)} style={{...inpSt,borderColor:"#ff8866",color:"#ff8866"}}/>
                    </div>
                    <div style={{fontSize:13,fontWeight:700,textAlign:"left",lineHeight:1.2}}>{partido[1]}</div>
                  </div>
                </div>
              );
            })}
            <button onClick={saveResultados} style={{width:"100%",background:R,border:"none",borderRadius:10,padding:"14px",fontSize:16,fontWeight:900,color:"#fff",cursor:"pointer",fontFamily:"'Outfit',sans-serif",marginTop:8}}>
              💾 GUARDAR RESULTADOS
            </button>
            {savedRes&&<div style={{background:"#082008",border:"1px solid #1a6600",borderRadius:10,padding:"12px",textAlign:"center",color:"#66ff66",fontWeight:800,fontSize:14,marginTop:10}}>✓ Resultados guardados correctamente</div>}
          </div>
        )}

        {/* ── BLOQUEOS ADMIN ── */}
        {tab==="bloqueos"&&isAdmin&&(
          <AdminBloqueos data={data} persist={persist}/>
        )}

      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("login");
  const [isAdmin,setIsAdmin]=useState(false);
  const [userName,setUserName]=useState("");
  const [nameInput,setNameInput]=useState("");
  const [passInput,setPassInput]=useState("");
  const [loginMode,setLoginMode]=useState("usuario");
  const [loginError,setLoginError]=useState("");
  const [loading,setLoading]=useState(false);
  const [data,setData]=useState(()=>migrateData(localLoad()));
  const [syncStatus,setSyncStatus]=useState("ok");
  const saveTimer=useRef(null);

  useEffect(()=>{
    cloudLoad().then(d=>{const md=migrateData(d);setData(md);localSave(md);setSyncStatus("ok");}).catch(()=>setSyncStatus("error"));
  },[]);

  function persist(nd){
    nd=migrateData(nd);setData(nd);localSave(nd);setSyncStatus("syncing");
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      cloudSave(nd).then(()=>setSyncStatus("ok")).catch(()=>setSyncStatus("error"));
    },800);
  }

  async function handleRefresh(){
    setSyncStatus("syncing");
    try{const d=await cloudLoad();const md=migrateData(d);setData(md);localSave(md);setSyncStatus("ok");}
    catch{setSyncStatus("error");}
  }

  async function handleLogin(){
    const name=nameInput.trim();
    if(!name){setLoginError("Ingresá tu nombre");return;}
    if(loginMode==="admin"){if(passInput!==ADMIN_PASS){setLoginError("Clave incorrecta");return;}setIsAdmin(true);}
    else{setIsAdmin(false);}
    setLoading(true);
    let cur=data;
    try{cur=await cloudLoad();cur=migrateData(cur);setData(cur);localSave(cur);setSyncStatus("ok");}
    catch{setSyncStatus("error");}
    if(!cur.jugadores[name]){
      const nd={...cur,jugadores:{...cur.jugadores,[name]:emptyUser()}};
      persist(nd);cur=nd;
    }
    setUserName(name);setLoading(false);setScreen("main");
  }

  if(screen==="login")return<LoginScreen nameInput={nameInput} setNameInput={setNameInput} passInput={passInput} setPassInput={setPassInput} loginMode={loginMode} setLoginMode={setLoginMode} loginError={loginError} onLogin={handleLogin} existingUsers={Object.keys(data.jugadores)} loading={loading}/>;
  return<MainScreen userName={userName} isAdmin={isAdmin} data={data} persist={persist} syncStatus={syncStatus} onLogout={()=>{setScreen("login");setNameInput("");setPassInput("");setLoginError("");setIsAdmin(false);}} onRefresh={handleRefresh}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
